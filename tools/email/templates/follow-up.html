<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Following Up</title>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:20px 0;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

          <!-- Body -->
          <tr>
            <td style="padding:16px 24px 8px 24px;">
              <p style="margin:0 0 16px 0;font-size:15px;line-height:24px;color:#333333;">Hi {{first_name}},</p>

              <div style="font-size:15px;line-height:24px;color:#333333;">{{follow_up_body}}</div>
            </td>
          </tr>

          <!-- CTA Link -->
          <tr>
            <td style="padding:8px 24px 24px 24px;">
              <p style="margin:0;">
                <a href="{{cta_link}}" target="_blank" style="font-size:15px;line-height:24px;color:#1B5E20;font-weight:bold;text-decoration:underline;">{{cta_text}}</a>
              </p>
            </td>
          </tr>

          <!-- Signature / Footer -->
          <tr>
            <td style="padding:16px 24px 24px 24px;border-top:1px solid #EEEEEE;">
              <p style="margin:0 0 4px 0;font-size:13px;line-height:18px;color:#999999;">SNAK Group</p>
              <p style="margin:0;font-size:11px;line-height:16px;color:#BBBBBB;">
                <a href="{{unsubscribe_link}}" style="color:#BBBBBB;text-decoration:underline;">Unsubscribe</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
